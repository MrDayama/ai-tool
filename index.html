<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_DASHBOARD_v2.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <header class="header panel">
        <div class="sys-info">
            <span class="bling">SYSTEM.ONLINE</span> >> <span id="sysId">STATUS: NOMINAL</span>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <main class="dashboard-grid">
        <!-- Calendar Panel -->
        <section class="panel calendar-panel">
            <h2 class="panel-title">[MOD_CALENDAR]</h2>
            <div class="cal-header">
                <button id="prevBtn" class="cyber-btn">
                    << /button>
                        <span id="monthYear" class="month-year-display">YYYY-MM</span>
                        <button id="nextBtn" class="cyber-btn">></button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- JS will inject days -->
            </div>
        </section>

        <!-- GitHub Activity Panel -->
        <section class="panel github-panel">
            <h2 class="panel-title">[MOD_GITHUB_LINK]</h2>
            <div class="gh-input-group">
                <span class="prompt">usr:</span>
                <input type="text" id="ghUsername" class="cyber-input" placeholder="Enter GitHub User" value="MrDayama">
                <button id="ghFetchBtn" class="cyber-btn">FETCH</button>
            </div>
            <div id="ghActivity" class="gh-activity-list">
                <div class="glitch-text" style="text-align:center; margin-top: 2rem;">AWAITING SIGNAL...</div>
            </div>
        </section>

        <!-- Task Tracker Panel -->
        <section class="panel task-panel" style="grid-column: 1 / -1;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 class="panel-title" style="margin: 0; border: none;">[MOD_ISSUE_TRACKER]</h2>
                <div style="display: flex; gap: 1rem;">
                    <select id="todoFilter" class="cyber-select">
                        <option value="All">ALL STATUS</option>
                        <option value="New">NEW</option>
                        <option value="In Progress">IN PROGRESS</option>
                        <option value="Resolved">RESOLVED</option>
                    </select>
                    <button id="todoAddBtn" class="cyber-btn">+ NEW ISSUE</button>
                </div>
            </div>
            <div class="task-table-wrapper">
                <table class="task-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Subject</th>
                            <th>Updated</th>
                        </tr>
                    </thead>
                    <tbody id="todoList">
                        <!-- JS injected tasks -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Notes Panel -->
        <section class="panel notes-panel">
            <h2 class="panel-title">[MOD_DATA_LOG]</h2>
            <textarea id="notesArea" class="cyber-textarea" placeholder="INPUT DATA STREAM HERE..."></textarea>
        </section>
    </main>

    <script src="app.js"></script>

    <!-- Task Modal -->
    <div id="taskModal" class="modal-overlay hidden">
        <div class="modal-content panel">
            <h2 class="panel-title" id="modalTitle">NEW ISSUE</h2>
            <input type="hidden" id="taskId">
            <div class="form-group">
                <label class="prompt">SUBJECT</label>
                <input type="text" id="taskSubject" class="cyber-input" placeholder="Enter task subject...">
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label class="prompt">STATUS</label>
                    <select id="taskStatus" class="cyber-select">
                        <option value="New">New</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="prompt">PRIORITY</label>
                    <select id="taskPriority" class="cyber-select">
                        <option value="Low">Low</option>
                        <option value="Normal" selected>Normal</option>
                        <option value="High">High</option>
                        <option value="Urgent">Urgent</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="prompt">DESCRIPTION</label>
                <textarea id="taskDesc" class="cyber-textarea"
                    placeholder="Detailed requirements or logs..."></textarea>
            </div>
            <div class="modal-actions">
                <button id="taskCancelBtn" class="cyber-btn"
                    style="border-color: var(--red); color: var(--red);">CANCEL</button>
                <button id="taskDelBtn" class="cyber-btn hidden"
                    style="border-color: var(--red); color: var(--red);">DELETE</button>
                <button id="taskSaveBtn" class="cyber-btn" style="background: rgba(0,255,65,0.2);">SAVE</button>
            </div>
        </div>
    </div>
</body>

</html>

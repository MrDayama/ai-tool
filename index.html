<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_DASHBOARD_v2.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <header class="header panel">
        <div class="sys-info">
            <span class="bling">SYSTEM.ONLINE</span> >> <span id="sysId">STATUS: NOMINAL</span>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <main class="dashboard-grid">
        <!-- Calendar Panel -->
        <section class="panel calendar-panel">
            <h2 class="panel-title">[MOD_CALENDAR]</h2>
            <div class="cal-header">
                <button id="prevBtn" class="cyber-btn">
                    << /button>
                        <span id="monthYear" class="month-year-display">YYYY-MM</span>
                        <button id="nextBtn" class="cyber-btn">></button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- JS will inject days -->
            </div>
        </section>

        <!-- GitHub Activity Panel -->
        <section class="panel github-panel">
            <h2 class="panel-title">[MOD_GITHUB_LINK]</h2>
            <div class="gh-input-group">
                <span class="prompt">usr:</span>
                <input type="text" id="ghUsername" class="cyber-input" placeholder="Enter GitHub User" value="MrDayama">
                <button id="ghFetchBtn" class="cyber-btn">FETCH</button>
            </div>
            <div id="ghActivity" class="gh-activity-list">
                <div class="glitch-text" style="text-align:center; margin-top: 2rem;">AWAITING SIGNAL...</div>
            </div>
        </section>

        <!-- To-Do Panel -->
        <section class="panel todo-panel">
            <h2 class="panel-title">[MOD_TASKS_QUEUE]</h2>
            <div class="todo-input-group">
                <span class="prompt">cmd:</span>
                <input type="text" id="todoInput" class="cyber-input" placeholder="Add new task...">
                <button id="todoAddBtn" class="cyber-btn">ADD</button>
            </div>
            <ul id="todoList" class="todo-list">
                <!-- JS will inject tasks -->
            </ul>
        </section>

        <!-- Notes Panel -->
        <section class="panel notes-panel">
            <h2 class="panel-title">[MOD_DATA_LOG]</h2>
            <textarea id="notesArea" class="cyber-textarea" placeholder="INPUT DATA STREAM HERE..."></textarea>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>

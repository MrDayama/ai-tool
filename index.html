<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Dashboard v3.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Global effects removed for clarity -->

    <header class="header panel">
        <div class="sys-info">
            <span class="bling">SYSTEM.ONLINE</span> >> <span id="sysId">STATUS: NOMINAL</span>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <nav class="main-nav">
        <button class="nav-btn active" data-screen="calendar">カレンダー</button>
        <button class="nav-btn" data-screen="tasks">チケット管理</button>
        <button class="nav-btn" data-screen="gantt">ガントチャート</button>
    </nav>

    <main class="dashboard-grid">
        <!-- Calendar Screen -->
        <div id="screen-calendar" class="screen-container active">
            <section class="panel calendar-panel">
                <div class="scanline-local"></div>
                <h2 class="panel-title">[MOD_CALENDAR_INTEL]</h2>
                <div class="cal-header">
                    <button id="prevBtn" class="cyber-btn">&lt;</button>
                    <span id="monthYear" class="month-year-display">YYYY-MM</span>
                    <button id="nextBtn" class="cyber-btn">&gt;</button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- JS will inject days -->
                </div>
            </section>

            <section class="panel notes-panel">
                <h2 class="panel-title">DATA_LOG_STREAM</h2>
                <textarea id="notesArea" class="cyber-textarea" placeholder="INPUT DATA STREAM HERE..."></textarea>
            </section>
        </div>

        <!-- Task Tracker Screen -->
        <div id="screen-tasks" class="screen-container">
            <section class="panel task-panel">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
                    <h2 class="panel-title" style="margin: 0; border: none;">チケット管理</h2>
                    <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
                        <select id="todoFilterAssignee" class="cyber-select" style="max-width: 150px;">
                            <option value="All">すべての担当者</option>
                        </select>
                        <select id="todoFilter" class="cyber-select" style="max-width: 150px;">
                            <option value="All">すべてのステータス</option>
                            <option value="New">新規</option>
                            <option value="In Progress">進行中</option>
                            <option value="Resolved">完了</option>
                        </select>
                        <button id="todoAddBtn" class="cyber-btn" style="background:#007bff; color:#fff; border:none;">+
                            新規チケット</button>
                    </div>
                </div>
                <div class="task-table-wrapper">
                    <table class="task-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>ステータス</th>
                                <th>担当者</th>
                                <th>進捗</th>
                                <th>題名</th>
                                <th>期限</th>
                            </tr>
                        </thead>
                        <tbody id="todoList">
                            <!-- JS injected tasks -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <!-- Gantt Chart Screen -->
        <div id="screen-gantt" class="screen-container">
            <section class="panel gantt-panel">
                <h2 class="panel-title">ガントチャート</h2>
                <div id="ganttContainer" class="gantt-container">
                    <!-- JS will inject gantt chart -->
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>

    <!-- Task Modal -->
    <div id="taskModal" class="modal-overlay hidden">
        <div class="modal-content panel">
            <h2 class="panel-title" id="modalTitle">NEW ISSUE</h2>
            <input type="hidden" id="taskId">
            <div class="form-group">
                <label class="prompt">題名</label>
                <input type="text" id="taskSubject" class="cyber-input" placeholder="チケットの題名を入力...">
            </div>
            <div class="form-group">
                <label class="prompt">親チケット</label>
                <select id="taskParentId" class="cyber-select">
                    <option value="">(なし / 親チケットとして登録)</option>
                </select>
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label class="prompt">ステータス</label>
                    <select id="taskStatus" class="cyber-select">
                        <option value="New">新規</option>
                        <option value="In Progress">進行中</option>
                        <option value="Resolved">完了</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="prompt">優先度</label>
                    <select id="taskPriority" class="cyber-select">
                        <option value="Low">低め</option>
                        <option value="Normal" selected>通常</option>
                        <option value="High">高め</option>
                        <option value="Urgent">緊急</option>
                    </select>
                </div>
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label class="prompt">担当者</label>
                    <input type="text" id="taskAssignee" class="cyber-input" placeholder="名前を入力...">
                </div>
                <div class="form-group">
                    <label class="prompt">進捗状況 (<span id="progressValue">0</span>%)</label>
                    <input type="range" id="taskProgress" class="cyber-range" min="0" max="100" step="10" value="0">
                </div>
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label class="prompt">開始日</label>
                    <input type="date" id="taskStartDate" class="cyber-input">
                </div>
                <div class="form-group">
                    <label class="prompt">期日</label>
                    <input type="date" id="taskDueDate" class="cyber-input">
                </div>
            </div>
            <div class="form-group">
                <label class="prompt">説明</label>
                <textarea id="taskDesc" class="cyber-textarea" placeholder="詳細な要件やログ..."></textarea>
            </div>
            <div class="modal-actions">
                <button id="taskCancelBtn" class="cyber-btn">キャンセル</button>
                <button id="taskDelBtn" class="cyber-btn hidden"
                    style="border-color: #dc3545; color: #dc3545;">削除</button>
                <button id="taskSaveBtn" class="cyber-btn"
                    style="background: #007bff; color: #fff; border:none;">保存</button>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal-overlay hidden">
        <div class="modal-content panel" style="max-width: 400px;">
            <h2 class="panel-title" id="eventModalTitle">EVENT LOG</h2>
            <input type="hidden" id="eventDate">
            <div class="form-group">
                <label class="prompt">LOG ENTRY</label>
                <input type="text" id="eventDescInput" class="cyber-input" placeholder="Enter plan / event...">
            </div>
            <div class="modal-actions">
                <button id="eventCancelBtn" class="cyber-btn">CANCEL</button>
                <button id="eventDelBtn" class="cyber-btn hidden"
                    style="border-color: #dc3545; color: #dc3545;">DELETE</button>
                <button id="eventSaveBtn" class="cyber-btn"
                    style="background: #28a745; color: #fff; border:none;">SAVE</button>
            </div>
        </div>
    </div>
</body>

</html>
